<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LogiTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        const token = localStorage.getItem("token");

        if (token) {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
</body>
</html>
