<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | LogiTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-box">LT</div>
                <div>
                    <h1>LogiTrack</h1>
                    <p>Warehouse Management</p>
                </div>
            </div>

            <h2>Iniciar sesión</h2>
            <p class="login-subtitle">Accede al sistema de gestión de bodegas.</p>

            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="admin@logitrack.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="123456" required>

                <button type="submit" class="btn-primary">Ingresar</button>

                <p id="loginMessage" class="message"></p>
            </form>

            <div class="login-help">
                <p>Usuario de prueba:</p>
                <span>admin@logitrack.com / 123456</span>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
